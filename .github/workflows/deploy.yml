# Pipeline unique : compilation LaTeX (incrémentale, avec cache) puis build
# Astro, puis publication sur la branche gh-pages (peaceiris/actions-gh-pages).
#
# La création de la branche gh-pages active GitHub Pages automatiquement
# (source : branche gh-pages). Si besoin, vérifier dans
# Settings → Pages que la source est bien « Deploy from a branch : gh-pages ».
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TeX Live minimal via apt (~2 min, jeu de paquets validé pour ce dépôt).
      - name: Installer TeX Live
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends \
            latexmk texlive-latex-recommended texlive-lang-french texlive-fonts-recommended lmodern \
            texlive-pictures

      # Cache des PDF déjà compilés : seuls les .tex modifiés sont recompilés
      # (scripts/build-latex.mjs compare les hash via public/pdfs/manifest.json).
      - name: Restaurer le cache des PDF
        uses: actions/cache@v4
        with:
          path: public/pdfs
          key: latex-pdfs-${{ hashFiles('content/**/*.tex', 'content/**/meta.yaml', 'templates/**/*.tex', 'scripts/build-latex.mjs') }}
          restore-keys: |
            latex-pdfs-

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler les PDF (latexmk)
        run: node scripts/build-latex.mjs

      - name: Générer les index JSON + build Astro
        run: npm run build

      - name: Déployer sur la branche gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
